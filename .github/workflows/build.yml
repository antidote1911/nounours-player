name: Build Nounours-Player

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  # ─────────────────────────────────────────────
  # Linux x86_64
  # ─────────────────────────────────────────────
  linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake \
            ninja-build \
            qt6-base-dev \
            qt6-base-private-dev \
            libqt6svg6-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-l10n-tools \
            libmpv-dev \
            libx11-dev \
            libgl-dev \
            pkg-config

      - name: Build
        run: |
          cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build build -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nounours-player-linux-x86_64
          path: build/nounours-player
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/nounours-player

  # ─────────────────────────────────────────────
  # Windows x64  (MSYS2 / MinGW-w64)
  # ─────────────────────────────────────────────
  windows:
    name: Windows x64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true

      - name: Install dependencies
        run: |
          pacman -S --noconfirm --needed \
            mingw-w64-x86_64-toolchain \
            mingw-w64-x86_64-cmake \
            mingw-w64-x86_64-ninja \
            mingw-w64-x86_64-pkg-config \
            mingw-w64-x86_64-angleproject \
            mingw-w64-x86_64-qt6-base \
            mingw-w64-x86_64-qt6-svg \
            mingw-w64-x86_64-qt6-tools \
            mingw-w64-x86_64-mpv \
            mingw-w64-x86_64-libzip

      - name: Build
        run: |
          cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build build -j$(nproc)

      - name: Deploy — collect DLLs
        run: |
          mkdir -p deploy
          cp build/nounours-player.exe deploy/
          windeployqt6 --release --no-translations deploy/nounours-player.exe
          ldd build/nounours-player.exe \
            | grep '/mingw64/bin' \
            | awk '{ print $3 }' \
            | xargs -I{} cp -n {} deploy/

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path deploy\* -DestinationPath nounours-player-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nounours-player-windows-x64
          path: nounours-player-windows-x64.zip
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: nounours-player-windows-x64.zip
