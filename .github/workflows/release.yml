name: Release Nounours-Player

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─────────────────────────────────────────────
  # Linux x86_64 — AppImage
  # ─────────────────────────────────────────────
  linux:
    name: Linux AppImage x86_64
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake \
            ninja-build \
            qt6-base-dev \
            qt6-base-private-dev \
            libqt6svg6-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-l10n-tools \
            libmpv-dev \
            libx11-dev \
            libgl-dev \
            pkg-config \
            patchelf \
            libfuse2

      - name: Build
        run: |
          cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build build -j$(nproc)

      - name: Install to AppDir
        run: cmake --install build --prefix "$(pwd)/AppDir/usr"

      - name: Download linuxdeploy tools
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Create AppImage
        env:
          QMAKE: qmake6
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage
          find . -maxdepth 1 -name "*.AppImage" ! -name "linuxdeploy*" \
            -exec mv {} "nounoursplayer-${{ env.VERSION }}-linux-x86_64.AppImage" \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "nounoursplayer-${{ env.VERSION }}-linux-x86_64.AppImage"
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Windows x64 — portable zip + setup.exe
  # ─────────────────────────────────────────────
  windows:
    name: Windows x64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true

      - name: Get version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          pacman -S --noconfirm --needed \
            mingw-w64-x86_64-toolchain \
            mingw-w64-x86_64-cmake \
            mingw-w64-x86_64-ninja \
            mingw-w64-x86_64-pkg-config \
            mingw-w64-x86_64-angleproject \
            mingw-w64-x86_64-qt6-base \
            mingw-w64-x86_64-qt6-svg \
            mingw-w64-x86_64-qt6-tools \
            mingw-w64-x86_64-mpv \
            mingw-w64-x86_64-libzip

      - name: Build
        run: |
          cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build build -j$(nproc)

      - name: Deploy — collect DLLs
        run: |
          mkdir -p deploy
          cp build/nounours-player.exe deploy/
          windeployqt6 --release --no-translations deploy/nounours-player.exe
          ldd build/nounours-player.exe \
            | grep '/mingw64/bin' \
            | awk '{ print $3 }' \
            | xargs -I{} cp -n {} deploy/

      - name: Package portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path deploy\* -DestinationPath "nounoursplayer-${{ env.VERSION }}-win-portable.zip"

      - name: Build setup installer
        shell: pwsh
        run: |
          $src = (Get-Location).Path
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="${{ env.VERSION }}" `
            /DMyDeployDir="$src\deploy" `
            /DMyOutputDir="$src" `
            /DMySourceDir="$src" `
            "packaging\windows\installer.iss"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: "nounoursplayer-${{ env.VERSION }}-win-portable.zip"
          if-no-files-found: error

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: "nounoursplayer-${{ env.VERSION }}-win-setup.exe"
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # Créer la release et attacher les binaires
  # ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: artifacts/

      - name: Download Windows portable artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: artifacts/

      - name: Download Windows setup artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-setup
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/nounoursplayer-${{ env.VERSION }}-linux-x86_64.AppImage
            artifacts/nounoursplayer-${{ env.VERSION }}-win-portable.zip
            artifacts/nounoursplayer-${{ env.VERSION }}-win-setup.exe
          generate_release_notes: true
